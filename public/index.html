<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>預防醫學營運系統 MVP</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f5f7fb; color: #111; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 14px; }
    .card { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    h1 { font-size: 20px; margin: 0 0 12px; }
    h2 { font-size: 16px; margin: 0 0 8px; }
    input, select, textarea, button { width: 100%; box-sizing: border-box; margin: 6px 0; padding: 10px; border-radius: 10px; border: 1px solid #d8deea; font-size: 14px; }
    button { background: #0b6bff; color: #fff; border: none; font-weight: 600; }
    .member { border: 1px solid #e3e8f3; border-radius: 10px; padding: 10px; margin-top: 8px; }
    .muted { color: #5f6b7a; font-size: 13px; }
    pre { white-space: pre-wrap; background: #f7f9ff; border-radius: 10px; padding: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>預防醫學營運系統（手機版 MVP）</h1>

    <div class="card">
      <h2>會員新增</h2>
      <input id="name" placeholder="姓名" />
      <input id="phone" placeholder="電話" />
      <select id="plan">
        <option>入門</option><option>標準</option><option>進階</option>
      </select>
      <select id="status">
        <option>潛在客戶</option><option>已成交</option><option>追蹤中</option>
      </select>
      <textarea id="notes" placeholder="備註"></textarea>
      <button onclick="addMember()">新增會員</button>
    </div>

    <div class="card">
      <h2>會員清單</h2>
      <div id="members" class="muted">載入中...</div>
    </div>

    <div class="card">
      <h2>AI 問答（知識庫）</h2>
      <textarea id="q" placeholder="例如：如何把入門方案提高成交率？"></textarea>
      <button onclick="askAI()">送出問題</button>
      <pre id="ans" class="muted">尚未提問</pre>
    </div>

    <div class="card">
      <h2>主目錄｜預防醫學專題資源</h2>
      <div class="muted">主題：代謝力與慢性病風險管理</div>
      <ul>
        <li><a href="/ppt-metabolic-prevention.html" target="_blank">HTML 圖文版 PPT</a></li>
        <li><a href="https://drive.google.com/uc?id=1ml64WccW0i62OpwV-6hmSrH0CI-Fefz5&export=download" target="_blank">ZIP 下載（Google Drive）</a>｜<a href="/downloads/metabolic-prevention-ppt.zip" target="_blank">站內鏡像</a></li>
        <li><a href="https://github.com/ericsawtw/preventive-med-mvp" target="_blank">GitHub 專案連結</a></li>
      </ul>
    </div>
  </div>

  <script>
    const api = '';

    async function loadMembers() {
      const data = await fetch(api + '/api/members').then(r => r.json());
      const el = document.getElementById('members');
      if (!data.length) return el.innerHTML = '<div class="muted">目前沒有會員</div>';
      el.innerHTML = data.map(m => `
        <div class="member">
          <b>${m.name}</b>（${m.plan}｜${m.status}）<br>
          <span class="muted">${m.phone || '無電話'} · ${new Date(m.createdAt).toLocaleString()}</span><br>
          <span>${m.notes || ''}</span>
        </div>
      `).join('');
    }

    async function addMember() {
      const body = {
        name: name.value,
        phone: phone.value,
        plan: plan.value,
        status: status.value,
        notes: notes.value
      };
      await fetch(api + '/api/members', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      });
      name.value=''; phone.value=''; notes.value='';
      await loadMembers();
    }

    async function askAI() {
      const question = document.getElementById('q').value;
      const data = await fetch(api + '/api/ask', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question })
      }).then(r => r.json());
      document.getElementById('ans').textContent = data.answer || data.error || '無結果';
    }

    loadMembers();
  </script>
</body>
</html>
