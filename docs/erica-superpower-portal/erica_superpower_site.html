<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erica 超能力網站</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f766e);color:#fff}
    .wrap{max-width:960px;margin:0 auto;padding:48px 20px}
    h1{font-size:44px;margin:0 0 8px}
    .sub{opacity:.9;margin-bottom:28px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:16px}
    .tag{display:inline-block;background:#22d3ee;color:#06202a;padding:4px 10px;border-radius:999px;font-weight:700;font-size:12px}
    h3{margin:10px 0}
    p{margin:0;line-height:1.55}
    .foot{margin-top:28px;opacity:.85;font-size:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <span class="tag">Erica · Super Assistant</span>
    <h1>艾瑞卡超能力網站</h1>
    <div class="sub">你可以把我當成「會做事的 AI 夥伴」：能查、能做、能交付。</div>
    <div class="grid">
      <div class="card"><h3>GitHub 能力</h3><p>可讀 repo、分析程式、修改檔案、打包交付。</p></div>
      <div class="card"><h3>Google Drive</h3><p>非原生 API 直連；可透過瀏覽器流程協助上傳與整理。</p></div>
      <div class="card"><h3>簡報工廠</h3><p>可製作互動式 HTML PPT、離線包、zip、發送到 Telegram。</p></div>
      <div class="card"><h3>自動化</h3><p>支援排程提醒、流程自動執行、跨工具整合。</p></div>
    </div>
    <div class="foot">版本：v1 · 為 Jason 團隊即時生成</div>
  </div>
</body>
</html>
